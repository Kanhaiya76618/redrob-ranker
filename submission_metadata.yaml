ai_usage_summary: |
  Used Claude as a pair programmer for architectural design, debugging, feature/penalty optimizations, and building the Streamlit showroom. No candidate data was sent to hosted APIs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-stage retrieve and rerank model. Tier 0 integrity gate blocks impossible honeypots. Tier 1 recall utilizes contrastive semantic fit (ideal minus anti-profiles vectors similarity). Tier 2 rerank employs a pre-trained LightGBM Regressor trained on synthetic labels derived from the JD rubric (integrating semantic fit, band fit, product company ratio, location fit, notice period fit, availability multiplier, company/domain/country penalties, stuffing/impossibility indices). Gated honeypot profiles are hard-filtered to score 0.0. Ties are broken deterministically by candidate ID ascending.

